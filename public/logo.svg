<svg viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="200" fill="#f8f9fa"/>
  
  <!-- Decorative circle background -->
  <circle cx="60" cy="100" r="55" fill="#10b981" opacity="0.1"/>
  <circle cx="60" cy="100" r="50" fill="none" stroke="#10b981" stroke-width="2"/>
  
  <!-- Shopping cart with groceries -->
  <g transform="translate(40, 80)">
    <!-- Cart body -->
    <path d="M 5 15 L 10 5 L 30 5 L 35 15 Z" fill="none" stroke="#10b981" stroke-width="2" stroke-linejoin="round"/>
    <!-- Cart handle -->
    <path d="M 10 5 Q 20 -5 30 5" fill="none" stroke="#10b981" stroke-width="2" stroke-linecap="round"/>
    <!-- Cart wheels -->
    <circle cx="12" cy="18" r="2" fill="#10b981"/>
    <circle cx="28" cy="18" r="2" fill="#10b981"/>
    <!-- Groceries in cart -->
    <circle cx="15" cy="12" r="2.5" fill="#f59e0b"/>
    <circle cx="22" cy="11" r="2.5" fill="#ef4444"/>
    <rect x="18" y="14" width="3" height="4" fill="#6366f1"/>
  </g>
  
  <!-- Brand Name -->
  <text x="110" y="95" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#10b981">
    Arokaya
  </text>
  <text x="110" y="120" font-family="Arial, sans-serif" font-size="16" fill="#6b7280">
    Grocery Mart
  </text>
  
  <!-- Tagline -->
  <text x="110" y="138" font-family="Arial, sans-serif" font-size="11" fill="#9ca3af" letter-spacing="1">
    Fresh Groceries, Fast Delivery
  </text>
  
  <!-- Decorative elements -->
  <circle cx="100" cy="55" r="3" fill="#10b981" opacity="0.6"/>
  <circle cx="340" cy="160" r="2.5" fill="#10b981" opacity="0.4"/>
  <circle cx="370" cy="80" r="2" fill="#10b981" opacity="0.5"/>
</svg>